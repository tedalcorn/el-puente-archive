<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Puente de Galisteo — Archive Index</title>
<style>
  :root {
    --sand: #f5f0e8;
    --earth: #8b7355;
    --clay: #c4956a;
    --sky: #6b9ac4;
    --ink: #2c2416;
    --sage: #7a8b6f;
    --paper: #faf8f3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--sand);
    color: var(--ink);
    line-height: 1.6;
  }

  header {
    background: var(--ink);
    color: var(--sand);
    padding: 1.5rem 2rem;
    text-align: center;
  }

  header h1 {
    font-size: 2rem;
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }

  header p {
    font-style: italic;
    opacity: 0.8;
    font-size: 0.95rem;
  }

  nav {
    background: var(--earth);
    display: flex;
    gap: 0;
    justify-content: center;
    flex-wrap: wrap;
  }

  nav button {
    background: none;
    border: none;
    color: var(--sand);
    padding: 0.75rem 1.5rem;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.2s;
  }

  nav button:hover { background: rgba(255,255,255,0.1); }
  nav button.active { background: rgba(255,255,255,0.2); font-weight: bold; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem;
  }

  .search-bar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .search-bar input {
    flex: 1;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    font-family: inherit;
    border: 2px solid var(--earth);
    border-radius: 4px;
    background: var(--paper);
  }

  .search-bar input:focus {
    outline: none;
    border-color: var(--sky);
  }

  .search-bar select {
    padding: 0.75rem;
    font-family: inherit;
    border: 2px solid var(--earth);
    border-radius: 4px;
    background: var(--paper);
  }

  /* View: Search results / articles */
  .article-card {
    background: var(--paper);
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    transition: box-shadow 0.2s;
  }

  .article-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

  .article-card .meta {
    font-size: 0.85rem;
    color: var(--earth);
    margin-bottom: 0.5rem;
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .article-card .meta .issue-link {
    color: var(--sky);
    cursor: pointer;
    text-decoration: underline;
  }

  .article-card h3 {
    font-size: 1.15rem;
    margin-bottom: 0.5rem;
  }

  .article-card .body-preview {
    font-size: 0.9rem;
    color: #555;
    max-height: 4.5em;
    overflow: hidden;
    position: relative;
  }

  .article-card .body-preview.expanded {
    max-height: none;
  }

  .article-card .toggle-body {
    font-size: 0.85rem;
    color: var(--sky);
    cursor: pointer;
    margin-top: 0.25rem;
    display: inline-block;
  }

  .tag {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-size: 0.78rem;
    margin: 0.1rem;
    cursor: pointer;
  }

  .tag-section {
    background: var(--clay);
    color: white;
  }

  .tag-person {
    background: var(--sky);
    color: white;
  }

  .tag-topic {
    background: var(--sage);
    color: white;
  }

  /* View: Browse Issues */
  .year-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    align-items: start;
  }
  @media (max-width: 900px) { .year-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 650px) { .year-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 400px) { .year-grid { grid-template-columns: 1fr; } }

  /* View: People */
  .people-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.75rem;
  }

  .person-card {
    background: var(--paper);
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 1rem;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }

  .person-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .person-card .name { font-weight: bold; }

  /* Alpha directory */
  .az-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.2rem;
    margin-bottom: 0.75rem;
  }
  .az-bar a {
    color: var(--sky);
    text-decoration: none;
    font-size: 0.9rem;
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    font-family: Georgia, serif;
  }
  .az-bar a:hover { background: var(--paper); }
  .az-bar a.empty { color: #bbb; pointer-events: none; }
  .alpha-section h4 {
    color: var(--earth);
    font-size: 1.1rem;
    margin: 1rem 0 0.3rem;
    border-bottom: 1px solid #ddd;
    padding-bottom: 0.2rem;
  }
  .alpha-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.2rem 0.4rem;
    border-radius: 3px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .alpha-row:hover { background: var(--paper); }
  .alpha-row .meta { color: var(--earth); font-size: 0.8rem; white-space: nowrap; margin-left: 1rem; }
  .person-card .count { color: var(--earth); font-size: 0.85rem; }

  /* View: Topics */
  .topics-cloud {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .topic-chip {
    padding: 0.4rem 0.8rem;
    border-radius: 20px;
    background: var(--sage);
    color: white;
    cursor: pointer;
    font-size: 0.9rem;
    transition: transform 0.2s;
  }

  .topic-chip:hover { transform: scale(1.05); }

  /* View: Trends */
  #trends-container {
    background: var(--paper);
    border-radius: 6px;
    padding: 1.5rem;
    border: 1px solid #ddd;
  }

  .trend-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .trend-controls button {
    padding: 0.3rem 0.7rem;
    border: 1px solid var(--earth);
    border-radius: 15px;
    background: var(--paper);
    cursor: pointer;
    font-size: 0.8rem;
    font-family: inherit;
  }

  .trend-controls button.selected {
    background: var(--sage);
    color: white;
    border-color: var(--sage);
  }

  canvas { width: 100% !important; }

  .stats-bar {
    display: flex;
    gap: 2rem;
    justify-content: center;
    padding: 1rem;
    font-size: 0.9rem;
    color: var(--earth);
    flex-wrap: wrap;
  }

  .stats-bar span { font-weight: bold; color: var(--ink); }

  .result-count {
    font-size: 0.9rem;
    color: var(--earth);
    margin-bottom: 1rem;
  }

  .highlight {
    background: #fff3cd;
    padding: 0 2px;
    border-radius: 2px;
  }

  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--earth);
    font-style: italic;
  }

  footer {
    text-align: center;
    padding: 2rem;
    color: var(--earth);
    font-size: 0.85rem;
    border-top: 1px solid #ddd;
    margin-top: 2rem;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.4rem; }
    nav button { padding: 0.6rem 1rem; font-size: 0.85rem; }
    main { padding: 1rem; }
    .search-bar { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>EL PUENTE DE GALISTEO</h1>
  <p>Community newsletter archive, 1997&ndash;2026</p>
</header>

<nav id="nav">
  <button class="active" data-view="search">Search</button>
  <button data-view="people">People</button>
  <button data-view="topics">Topics</button>
  <button data-view="trends">Trends</button>
  <button data-view="issues">Browse Issues</button>
</nav>

<div class="stats-bar" id="stats-bar"></div>

<main id="main">
  <div class="loading" id="loading">Loading archive...</div>
</main>

<footer>
  El Puente de Galisteo, est. 1997. Archive index built from <span id="issue-count">~240</span> issues.
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
// ---- Data loading ----
let DATA = { articles: [], issues: [], people: {}, topics: {}, trends: {} };
let currentView = 'search';
let searchQuery = '';
let filterType = 'all';
let hideBoilerplate = true; // hide classifieds, sponsors, mastheads by default
let topicFilter = null;  // when set, search filters by exact topic tag
let personFilter = null; // when set, search filters by exact person tag
let searchGeneration = 0; // incremented each renderSearch call; stale debounces bail out

const BOILERPLATE_TYPES = new Set(['classified', 'sponsor', 'masthead']);

async function loadData() {
  try {
    const [articles, issues, people, topics, trends] = await Promise.all([
      fetch('articles.json').then(r => r.json()),
      fetch('issues.json').then(r => r.json()),
      fetch('people.json').then(r => r.json()),
      fetch('topics.json').then(r => r.json()),
      fetch('trends.json').then(r => r.json()),
    ]);
    DATA = { articles, issues, people, topics, trends };

    // Build lookup
    DATA.articleMap = {};
    articles.forEach(a => DATA.articleMap[a.id] = a);

    document.getElementById('stats-bar').innerHTML = `
      <div><span>${issues.length}</span> issues</div>
      <div><span>${articles.length}</span> articles</div>
      <div><span>${Object.keys(people).length}</span> people</div>
      <div><span>${Object.keys(topics).length}</span> topics</div>
    `;
    document.getElementById('issue-count').textContent = issues.length;

    showView('search');
  } catch (e) {
    document.getElementById('loading').textContent = 'Error loading data. Make sure JSON files are in the same directory.';
    console.error(e);
  }
}

// ---- Navigation ----
document.getElementById('nav').addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON') {
    document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    showView(e.target.dataset.view);
  }
});

function showView(view) {
  currentView = view;
  const main = document.getElementById('main');

  switch(view) {
    case 'search': renderSearch(main); break;
    case 'people': renderPeople(main); break;
    case 'topics': renderTopics(main); break;
    case 'trends': renderTrends(main); break;
    case 'issues': renderIssues(main); break;
  }
}

// ---- Search view ----
function renderSearch(container, prefill = '') {
  const myGeneration = ++searchGeneration; // stale-debounce guard

  container.innerHTML = `
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search articles, people, topics..." value="${escapeHtml(prefill || searchQuery)}">
      <select id="filter-type">
        <option value="all">All types</option>
        <option value="feature">Features</option>
        <option value="editorial">Editorials</option>
        <option value="pedacito">Pedacitos</option>
        <option value="obituary">Obituaries</option>
        <option value="gca_report">GCA Reports</option>
        <option value="fire_dept">Fire Dept</option>
        <option value="church_news">Church News</option>
        <option value="letter">Letters</option>
        <option value="classified">Classifieds</option>
      </select>
    </div>
    <div style="margin-bottom:1rem">
      <label style="font-size:0.9rem;cursor:pointer;color:var(--earth)">
        <input type="checkbox" id="hide-boilerplate" ${hideBoilerplate ? 'checked' : ''}>
        Hide classifieds, sponsors &amp; mastheads
      </label>
    </div>
    <div id="results"></div>
  `;

  const input = document.getElementById('search-input');
  const filter = document.getElementById('filter-type');
  const boilerplateToggle = document.getElementById('hide-boilerplate');
  filter.value = filterType;

  const doSearch = () => {
    if (searchGeneration !== myGeneration) return; // this render was replaced; ignore
    topicFilter = null;  // user typing clears topic-tag mode
    personFilter = null; // user typing clears person-tag mode
    searchQuery = input.value;
    filterType = filter.value;
    hideBoilerplate = boilerplateToggle.checked;
    performSearch(searchQuery, filterType);
  };

  input.addEventListener('input', debounce(doSearch, 300));
  filter.addEventListener('change', doSearch);
  boilerplateToggle.addEventListener('change', doSearch);

  if (topicFilter || personFilter) {
    // Tag-filter mode: filter by exact tag, don't clear the filter
    filterType = filter.value;
    hideBoilerplate = boilerplateToggle.checked;
    performSearch(searchQuery, filterType);
  } else if (prefill || searchQuery) {
    doSearch();
  }
}

function performSearch(query, type) {
  const results = document.getElementById('results');
  let matches = DATA.articles;

  if (hideBoilerplate && type === 'all') {
    matches = matches.filter(a => !BOILERPLATE_TYPES.has(a.section_type));
  }

  if (type !== 'all') {
    matches = matches.filter(a => a.section_type === type);
  }

  if (topicFilter) {
    const tf = topicFilter.toLowerCase();
    matches = matches.filter(a => a.topics.some(t => t.toLowerCase() === tf));
  } else if (personFilter) {
    const pf = personFilter.toLowerCase();
    matches = matches.filter(a => a.people.some(p => p.toLowerCase() === pf));
  } else if (query.trim()) {
    const terms = query.toLowerCase().split(/\s+/);
    matches = matches.filter(a => {
      const text = `${a.title} ${a.body} ${a.people.join(' ')} ${a.topics.join(' ')}`.toLowerCase();
      return terms.every(t => text.includes(t));
    });
  }

  results.innerHTML = `<div class="result-count">${matches.length} result${matches.length !== 1 ? 's' : ''}</div>`;

  matches.forEach(a => {
    results.appendChild(createArticleCard(a, query));
  });
}

function createArticleCard(article, highlight = '') {
  const card = document.createElement('div');
  card.className = 'article-card';

  const bodyPreview = article.body ? article.body.substring(0, 400) : '';
  const displayBody = highlight ? highlightText(bodyPreview, highlight) : escapeHtml(bodyPreview);
  const displayTitle = highlight ? highlightText(article.title || 'Untitled', highlight) : escapeHtml(article.title || 'Untitled');

  card.innerHTML = `
    <div class="meta">
      <span class="issue-link" onclick="searchByIssue('${article.issue_numbers}')">Issue #${article.issue_numbers}</span>
      <span>${article.date_string || ''}</span>
      <span class="tag tag-section">${article.section_type}</span>
    </div>
    <h3>${displayTitle}</h3>
    ${article.byline ? `<div style="font-style:italic;color:var(--earth);font-size:0.9rem;margin-bottom:0.4rem">By ${escapeHtml(article.byline)}</div>` : ''}
    <div class="body-preview" id="body-${article.id}">${displayBody}${article.body && article.body.length > 400 ? '...' : ''}</div>
    ${article.body && article.body.length > 400 ? `<span class="toggle-body" onclick="toggleBody(${article.id})">Show more</span>` : ''}
    <div style="margin-top:0.5rem">
      ${article.people.map(p => `<span class="tag tag-person" onclick="searchPerson('${escapeAttr(p)}')">${escapeHtml(p)}</span>`).join('')}
      ${article.topics.map(t => `<span class="tag tag-topic" onclick="searchTopic('${escapeAttr(t)}')">${escapeHtml(t)}</span>`).join('')}
    </div>
  `;
  return card;
}

function toggleBody(id) {
  const el = document.getElementById(`body-${id}`);
  const article = DATA.articleMap[id];
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    el.innerHTML = escapeHtml(article.body.substring(0, 400)) + '...';
    el.nextElementSibling.textContent = 'Show more';
  } else {
    el.classList.add('expanded');
    el.innerHTML = escapeHtml(article.body);
    el.nextElementSibling.textContent = 'Show less';
  }
}

// ---- People view ----
function renderPeople(container) {
  // Recount people excluding boilerplate if toggle is on, and track year ranges
  let peopleData = {};
  DATA.articles.forEach(a => {
    if (hideBoilerplate && BOILERPLATE_TYPES.has(a.section_type)) return;
    const year = a.sort_date ? parseInt(a.sort_date.substring(0, 4)) : null;
    a.people.forEach(p => {
      if (!peopleData[p]) peopleData[p] = { count: 0, minYear: 9999, maxYear: 0 };
      peopleData[p].count++;
      if (year) {
        if (year < peopleData[p].minYear) peopleData[p].minYear = year;
        if (year > peopleData[p].maxYear) peopleData[p].maxYear = year;
      }
    });
  });

  let peopleSort = 'frequency';

  container.innerHTML = `
    <div class="search-bar">
      <input type="text" id="people-filter" placeholder="Filter people...">
    </div>
    <div style="margin-bottom:0.4rem;font-size:0.9rem;color:var(--earth)">
      Order by&nbsp;
      <label style="cursor:pointer"><input type="radio" name="people-sort" value="frequency" checked> frequency of mention</label>
      &nbsp;&nbsp;
      <label style="cursor:pointer"><input type="radio" name="people-sort" value="name"> last name</label>
    </div>
    <div style="margin-bottom:1rem">
      <label style="font-size:0.9rem;cursor:pointer;color:var(--earth)">
        <input type="checkbox" id="people-hide-boilerplate" ${hideBoilerplate ? 'checked' : ''}>
        Hide classifieds, sponsors &amp; mastheads
      </label>
    </div>
    <div id="people-output"></div>
  `;

  const output = document.getElementById('people-output');
  const input  = document.getElementById('people-filter');
  const toggle = document.getElementById('people-hide-boilerplate');

  toggle.addEventListener('change', () => { hideBoilerplate = toggle.checked; renderPeople(container); });
  document.querySelectorAll('input[name="people-sort"]').forEach(r => {
    r.addEventListener('change', () => { peopleSort = r.value; render(input.value); });
  });

  function yearRange(data) {
    if (!data.minYear || data.minYear === 9999) return '';
    return data.minYear === data.maxYear ? `${data.minYear}` : `${data.minYear}&ndash;${data.maxYear}`;
  }

  function renderFrequency(entries) {
    const grid = document.createElement('div');
    grid.className = 'people-grid';
    entries.slice(0, 300).forEach(([name, data]) => {
      const card = document.createElement('div');
      card.className = 'person-card';
      const yr = yearRange(data);
      card.innerHTML = `<div class="name">${escapeHtml(name)}</div><div class="count">${data.count} mention${data.count !== 1 ? 's' : ''}${yr ? ' &middot; ' + yr : ''}</div>`;
      card.onclick = () => searchPerson(name);
      grid.appendChild(card);
    });
    output.innerHTML = '';
    output.appendChild(grid);
  }

  function primaryLast(name) {
    // For Spanish compound surnames (e.g. "Ortiz y Pino"), sort by the word before " y "
    if (name.includes(' y ')) return name.split(' y ')[0].split(' ').pop().toLowerCase();
    return name.split(' ').pop().toLowerCase();
  }

  let activeLetter = 'A';

  function renderAlpha(entries) {
    // Group by first letter of primary last name
    const byLetter = {};
    entries.forEach(([name, data]) => {
      const letter = primaryLast(name)[0].toUpperCase();
      if (!byLetter[letter]) byLetter[letter] = [];
      byLetter[letter].push([name, data]);
    });
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

    // If activeLetter has no entries, pick first available
    if (!byLetter[activeLetter]) activeLetter = letters.find(l => byLetter[l]) || 'A';

    function showLetter(l) {
      activeLetter = l;

      // Update bar highlighting
      document.querySelectorAll('.az-bar button').forEach(btn => {
        btn.style.fontWeight = btn.dataset.letter === l ? 'bold' : '';
        btn.style.color     = btn.dataset.letter === l ? 'var(--ink)' : '';
      });

      // Render names for this letter, sorted by primary last name then first name
      const nameList = document.getElementById('alpha-namelist');
      nameList.innerHTML = '';
      (byLetter[l] || [])
        .sort((a, b) => {
          const lA = primaryLast(a[0]), lB = primaryLast(b[0]);
          return lA < lB ? -1 : lA > lB ? 1 : a[0] < b[0] ? -1 : 1;
        })
        .forEach(([name, data]) => {
          const row = document.createElement('div');
          row.className = 'alpha-row';
          const yr = yearRange(data);
          row.innerHTML = `<span>${escapeHtml(name)}</span><span class="meta">${data.count} mention${data.count !== 1 ? 's' : ''}${yr ? ' &middot; ' + yr : ''}</span>`;
          row.onclick = () => searchPerson(name);
          nameList.appendChild(row);
        });
    }

    // A-Z bar
    const bar = document.createElement('div');
    bar.className = 'az-bar';
    letters.forEach(l => {
      const btn = document.createElement('button');
      btn.textContent = l;
      btn.dataset.letter = l;
      btn.style.cssText = 'background:none;border:none;cursor:pointer;font-family:Georgia,serif;font-size:0.9rem;padding:0.1rem 0.35rem;border-radius:3px;color:var(--sky)';
      if (!byLetter[l]) { btn.style.color = '#bbb'; btn.disabled = true; }
      else btn.addEventListener('click', () => showLetter(l));
      bar.appendChild(btn);
    });

    const nameList = document.createElement('div');
    nameList.id = 'alpha-namelist';

    output.innerHTML = '';
    output.appendChild(bar);
    output.appendChild(nameList);
    showLetter(activeLetter);
  }

  function render(filter = '') {
    let entries = Object.entries(peopleData);
    if (filter) entries = entries.filter(([name]) => name.toLowerCase().includes(filter.toLowerCase()));
    if (peopleSort === 'name') {
      renderAlpha(entries);
    } else {
      entries.sort((a, b) => b[1].count - a[1].count);
      renderFrequency(entries);
    }
  }

  input.addEventListener('input', debounce(() => render(input.value), 200));
  render();
}

// ---- Topics view ----
let topicsSort = 'frequency';
let topicsActiveLetter = 'A';

function renderTopics(container) {
  let topicCounts = {};
  DATA.articles.forEach(a => {
    if (hideBoilerplate && BOILERPLATE_TYPES.has(a.section_type)) return;
    a.topics.forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; });
  });

  const sorted = Object.entries(topicCounts).sort((a, b) => b[1] - a[1]);
  const maxCount = sorted[0]?.[1] || 1;

  container.innerHTML = `
    <div style="margin-bottom:0.4rem;font-size:0.9rem;color:var(--earth)">
      Order by&nbsp;
      <label style="cursor:pointer"><input type="radio" name="topics-sort" value="frequency" ${topicsSort === 'frequency' ? 'checked' : ''}> frequency</label>
      &nbsp;&nbsp;
      <label style="cursor:pointer"><input type="radio" name="topics-sort" value="name"> topic name</label>
    </div>
    <div style="margin-bottom:1rem">
      <label style="font-size:0.9rem;cursor:pointer;color:var(--earth)">
        <input type="checkbox" id="topics-hide-boilerplate" ${hideBoilerplate ? 'checked' : ''}>
        Hide classifieds, sponsors &amp; mastheads
      </label>
    </div>
    <div id="topics-output"></div>
  `;

  document.getElementById('topics-hide-boilerplate').addEventListener('change', (e) => {
    hideBoilerplate = e.target.checked;
    renderTopics(container);
  });
  document.querySelectorAll('input[name="topics-sort"]').forEach(r => {
    r.addEventListener('change', () => { topicsSort = r.value; renderMode(); });
  });

  const output = document.getElementById('topics-output');

  function renderFrequency() {
    const cloud = document.createElement('div');
    cloud.className = 'topics-cloud';
    sorted.slice(0, 80).forEach(([name, count]) => {
      const scale = 0.8 + (count / maxCount) * 1.2;
      const chip = document.createElement('span');
      chip.className = 'topic-chip';
      chip.style.fontSize = `${scale}rem`;
      chip.textContent = `${name} (${count})`;
      chip.onclick = () => searchTopic(name);
      cloud.appendChild(chip);
    });
    output.innerHTML = '';
    output.appendChild(cloud);
  }

  function topicSortKey(name) {
    // Strip leading Spanish/English articles so "El Rinconcito" sorts under R, etc.
    return name.replace(/^(El |La |Los |Las |The )/i, '').toUpperCase();
  }

  function renderAlpha() {
    const byLetter = {};
    sorted.forEach(([name, count]) => {
      const letter = topicSortKey(name)[0];
      if (!byLetter[letter]) byLetter[letter] = [];
      byLetter[letter].push([name, count]);
    });
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    if (!byLetter[topicsActiveLetter]) topicsActiveLetter = letters.find(l => byLetter[l]) || 'A';

    function showLetter(l) {
      topicsActiveLetter = l;
      document.querySelectorAll('.topics-az-bar button').forEach(btn => {
        btn.style.fontWeight = btn.dataset.letter === l ? 'bold' : '';
        btn.style.color     = btn.dataset.letter === l ? 'var(--ink)' : '';
      });
      const list = document.getElementById('topics-alpha-list');
      list.innerHTML = '';
      (byLetter[l] || []).sort((a, b) => topicSortKey(a[0]) < topicSortKey(b[0]) ? -1 : 1).forEach(([name, count]) => {
        const row = document.createElement('div');
        row.className = 'alpha-row';
        row.innerHTML = `<span>${escapeHtml(name)}</span><span class="meta">${count} article${count !== 1 ? 's' : ''}</span>`;
        row.onclick = () => searchTopic(name);
        list.appendChild(row);
      });
    }

    const bar = document.createElement('div');
    bar.className = 'az-bar topics-az-bar';
    letters.forEach(l => {
      const btn = document.createElement('button');
      btn.textContent = l;
      btn.dataset.letter = l;
      btn.style.cssText = 'background:none;border:none;cursor:pointer;font-family:Georgia,serif;font-size:0.9rem;padding:0.1rem 0.35rem;border-radius:3px;color:var(--sky)';
      if (!byLetter[l]) { btn.style.color = '#bbb'; btn.disabled = true; }
      else btn.addEventListener('click', () => showLetter(l));
      bar.appendChild(btn);
    });

    const list = document.createElement('div');
    list.id = 'topics-alpha-list';
    output.innerHTML = '';
    output.appendChild(bar);
    output.appendChild(list);
    showLetter(topicsActiveLetter);
  }

  function renderMode() {
    if (topicsSort === 'name') renderAlpha(); else renderFrequency();
  }
  renderMode();
}

// ---- Trends view ----
let trendChart = null;

function renderTrends(container) {
  const trends = DATA.trends;
  if (!trends.topics) {
    container.innerHTML = '<p>No trend data available.</p>';
    return;
  }

  container.innerHTML = `
    <div id="trends-container">
      <h3 style="margin-bottom:1rem">Topic frequency over time</h3>
      <div class="trend-controls" id="trend-controls"></div>
      <div style="height:450px;max-height:60vh;position:relative">
        <canvas id="trend-canvas"></canvas>
      </div>
    </div>
  `;

  const colors = [
    '#c4956a', '#6b9ac4', '#7a8b6f', '#d4726a', '#8b7355',
    '#9b8ec4', '#c49a6a', '#6bc4a8', '#c46b8b', '#6b8bc4',
  ];

  // Aggregate monthly series into annual
  // Drop the most recent year — it's incomplete and makes trends look like they plummeted.
  // It will automatically appear once issues from the following year are added.
  const annualDates = [...new Set(trends.dates.map(d => d.substring(0, 4)))].sort().slice(0, -1);
  const annualSeries = {};
  trends.topics.forEach(topic => {
    const monthly = trends.series[topic] || {};
    annualSeries[topic] = {};
    annualDates.forEach(year => {
      let total = 0;
      Object.entries(monthly).forEach(([month, count]) => {
        if (month.startsWith(year)) total += count;
      });
      if (total > 0) annualSeries[topic][year] = total;
    });
  });

  const controls = document.getElementById('trend-controls');
  const selectedTopics = new Set(trends.topics.slice(0, 2));

  function renderControls() {
    controls.innerHTML = '';
    trends.topics.forEach(topic => {
      const btn = document.createElement('button');
      btn.textContent = topic;
      btn.className = selectedTopics.has(topic) ? 'selected' : '';
      btn.onclick = () => {
        if (selectedTopics.has(topic)) selectedTopics.delete(topic);
        else selectedTopics.add(topic);
        renderControls();
        renderChart();
      };
      controls.appendChild(btn);
    });
  }

  function renderChart() {
    const ctx = document.getElementById('trend-canvas').getContext('2d');
    if (trendChart) trendChart.destroy();

    const datasets = [];
    let i = 0;
    selectedTopics.forEach(topic => {
      datasets.push({
        label: topic,
        data: annualDates.map(y => annualSeries[topic]?.[y] || 0),
        backgroundColor: colors[i % colors.length] + 'cc',
        borderColor: colors[i % colors.length],
        borderWidth: 1,
      });
      i++;
    });

    trendChart = new Chart(ctx, {
      type: 'line',
      data: { labels: annualDates, datasets: datasets.map(ds => ({
        ...ds,
        fill: false,
        tension: 0.3,
        pointRadius: 3,
        borderWidth: 2,
      })) },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: {
            ticks: {
              maxRotation: 0,
              callback: function(val, idx) {
                const year = parseInt(this.getLabelForValue(idx));
                return year % 5 === 0 ? year : '';
              }
            }
          },
          y: { beginAtZero: true, title: { display: true, text: 'Articles' } }
        },
        plugins: { legend: { position: 'top' } }
      }
    });
  }

  renderControls();
  renderChart();
}

// ---- Issues view ----
function renderIssues(container) {
  const sortedIssues = [...DATA.issues].sort((a, b) => {
    const numA = parseInt(a.issue_numbers.split('-')[0], 10);
    const numB = parseInt(b.issue_numbers.split('-')[0], 10);
    return numA - numB;
  });

  // Group by year
  const byYear = {};
  sortedIssues.forEach(issue => {
    const year = issue.sort_date ? issue.sort_date.substring(0, 4) : '?';
    if (!byYear[year]) byYear[year] = [];
    byYear[year].push(issue);
  });

  // Build grid of year boxes
  const grid = document.createElement('div');
  grid.className = 'year-grid';

  Object.keys(byYear).sort().forEach(year => {
    const box = document.createElement('div');
    box.style.cssText = 'background:var(--paper);border:1px solid #ddd;border-radius:6px;padding:0.75rem';

    const heading = document.createElement('div');
    heading.textContent = year;
    heading.style.cssText = 'font-weight:bold;color:var(--earth);margin-bottom:0.4rem;font-size:1rem';
    box.appendChild(heading);

    byYear[year].forEach(issue => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:baseline;padding:0.15rem 0.3rem;border-radius:3px;cursor:pointer;font-size:0.85rem';
      const MONTH_MAP = {
        jan:'January', feb:'February', mar:'March', apr:'April',
        jun:'June', jul:'July', aug:'August', sep:'September',
        sept:'September', oct:'October', nov:'November', dec:'December'
      };
      const monthOnly = (issue.date_string || '')
        .replace(/-\d{4}$/, '')   // drop trailing year
        .replace(/-\d{4}/g, '')   // drop any interior years
        .split('-')
        .map(p => MONTH_MAP[p.toLowerCase()] || (p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()))
        .join('-');
      row.innerHTML = `<strong>#${escapeHtml(issue.issue_numbers)}</strong> ${escapeHtml(monthOnly)}`;
      row.onmouseover = () => row.style.background = 'var(--sand)';
      row.onmouseout  = () => row.style.background = '';
      row.onclick = () => searchByIssue(issue.issue_numbers);
      box.appendChild(row);
    });

    grid.appendChild(box);
  });

  container.innerHTML = '';
  container.appendChild(grid);
}

function searchPerson(name) {
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-view="search"]').classList.add('active');
  personFilter = name;
  searchQuery = name;
  filterType = 'all';
  renderSearch(document.getElementById('main'), name);
}

function searchTopic(name) {
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-view="search"]').classList.add('active');
  topicFilter = name;
  searchQuery = name;
  filterType = 'all';
  renderSearch(document.getElementById('main'), name);
}

function searchByIssue(issueNums) {
  document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-view="search"]').classList.add('active');
  currentView = 'search';

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search within this issue..." value="">
      <button onclick="showView('search')" style="padding:0.75rem 1rem;border:2px solid var(--earth);border-radius:4px;background:var(--paper);cursor:pointer;font-family:inherit">Back to all</button>
    </div>
    <div class="result-count">Issue #${escapeHtml(issueNums)}</div>
    <div id="results"></div>
  `;

  const results = document.getElementById('results');
  const articles = DATA.articles.filter(a => a.issue_numbers === issueNums);
  articles.forEach(a => results.appendChild(createArticleCard(a)));
}

function highlightText(text, query) {
  if (!query.trim()) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 1);
  let result = escaped;
  terms.forEach(term => {
    const regex = new RegExp(`(${escapeRegex(term)})`, 'gi');
    result = result.replace(regex, '<span class="highlight">$1</span>');
  });
  return result;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}
